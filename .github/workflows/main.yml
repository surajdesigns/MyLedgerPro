name: iOS Build Audit

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: List Project Files
        run: |
          pwd
          ls -la
          find . -name "*.xcodeproj"

      - name: List Schemes
        run: |
          xcodebuild -list -project MyLedgerPro.xcodeproj

      - name: Build Project
        run: |
          xcodebuild \
          -project MyLedgerPro.xcodeproj \
          -scheme MyLedgerPro \
          -sdk iphonesimulator \
          build
